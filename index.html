<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kompakt Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #f5f3f0;
      color: #1a1918;
      font-family: 'Alegreya', Georgia, serif;
      overflow: hidden;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }


    .anim-fade-up { animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) both; }
    .anim-fade    { animation: fadeIn 1.2s ease both; }

    /* Tweaks panel */
    #tweaks-panel {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a1918; color: #f5f3f0;
      padding: 20px 24px; border-radius: 4px;
      font-family: 'Alegreya', serif;
      font-size: 14px;
      z-index: 1000;
      display: none;
      min-width: 200px;
    }
    #tweaks-panel.visible { display: block; }
    #tweaks-panel h3 {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 16px;
      color: #9a9490;
    }
    .tweak-option {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; cursor: pointer;
    }
    .tweak-option input { accent-color: #f5f3f0; cursor: pointer; }
    .tweak-option label { cursor: pointer; font-style: italic; }
  </style>
</head>
<body>

<div id="root"></div>
<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-option">
    <input type="radio" name="layout" id="l1" value="centered" checked>
    <label for="l1">Centered</label>
  </div>
  <div class="tweak-option">
    <input type="radio" name="layout" id="l2" value="typographic">
    <label for="l2">Typographic</label>
  </div>
  <div class="tweak-option">
    <input type="radio" name="layout" id="l3" value="column">
    <label for="l3">Column</label>
  </div>
</div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "centered"
}/*EDITMODE-END*/;

// Load persisted layout from localStorage
const saved = (() => { try { return JSON.parse(localStorage.getItem('kompakt-tweaks') || '{}'); } catch(e){return{};} })();
const defaults = { ...TWEAK_DEFAULTS, ...saved };

function Mark({ size = 100, color = '#1a1918' }) {
  const d = size / 100;
  return (
    <svg viewBox="-6 -6 112 112" width={size} height={size} style={{display:'block'}}>
      <rect x="3" y="3" width="94" height="94" rx="14" fill="none"
        stroke={color} strokeWidth={5.5 * d} />
      <line x1="34" y1="26" x2="34" y2="74"
        stroke={color} strokeWidth={5.5 * d} strokeLinecap="round" />
      <line x1="34" y1="50" x2="68" y2="26"
        stroke={color} strokeWidth={5.5 * d} strokeLinecap="round" />
      <line x1="34" y1="50" x2="68" y2="74"
        stroke={color} strokeWidth={5.5 * d} strokeLinecap="round" />
    </svg>
  );
}

// --- Layout A: Centered ---
function LayoutCentered() {
  return (
    <div style={{
      height:'100vh', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', gap: 0,
      padding: '10vh 5vw'
    }}>
      <div className="anim-fade" style={{animationDelay:'0s'}}>
        <Mark size={150} />
      </div>

      <div className="anim-fade-up" style={{animationDelay:'0.4s', textAlign:'center', marginTop: 32}}>
        <div style={{
          fontWeight:700, fontSize:'clamp(48px, 8vw, 96px)',
          letterSpacing:'0.15em', lineHeight:1,
        }}>KOMPAKT</div>
        <div style={{
          fontWeight:500, fontStyle:'italic',
          fontSize:'clamp(11px, 1.2vw, 14px)',
          letterSpacing:'0.4em', color:'#9a9490',
          marginTop: 6
        }}>SOLUTIONS</div>
      </div>

      <div className="anim-fade" style={{animationDelay:'0.9s', marginTop: 40, display:'flex', flexDirection:'column', alignItems:'center', gap:16}}>
        <a href="mailto:contato@kompakt.solutions" style={{
          fontSize:'clamp(12px, 1.1vw, 14px)',
          letterSpacing:'0.25em', color:'#9a9490',
          textDecoration:'none', fontStyle:'italic',
          transition:'color 0.2s'
        }}
        onMouseEnter={e => e.target.style.color='#1a1918'}
        onMouseLeave={e => e.target.style.color='#9a9490'}
        >
          contato@kompakt.solutions
        </a>
        <div style={{display:'flex', gap:24}}>
          {[
            {
              href:'https://github.com/kompakt-solutions',
              label:'GitHub',
              icon: <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-label="GitHub"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            },
            {
              href:'https://www.linkedin.com/company/kompakt-solutions',
              label:'LinkedIn',
              icon: <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-label="LinkedIn"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            },
          ].map(({label, href, icon}) => (
            <a key={label} href={href} target="_blank" rel="noopener noreferrer"
              aria-label={label}
              style={{
                color:'#9a9490', textDecoration:'none',
                transition:'color 0.2s', display:'block'
              }}
              onMouseEnter={e=>e.currentTarget.style.color='#1a1918'}
              onMouseLeave={e=>e.currentTarget.style.color='#9a9490'}
            >{icon}</a>
          ))}
        </div>
      </div>
    </div>
  );
}

// --- Layout B: Typographic ---
function LayoutTypographic() {
  return (
    <div style={{
      height:'100vh', display:'grid',
      gridTemplateRows:'1fr auto',
      padding:'clamp(32px,5vw,64px)'
    }}>
      {/* Top: wordmark massive */}
      <div style={{ display:'flex', alignItems:'center' }}>
        <div className="anim-fade-up" style={{animationDelay:'0.1s', width:'100%'}}>
          <div style={{
            fontWeight:700,
            fontSize:'clamp(72px, 14vw, 180px)',
            letterSpacing:'0.08em',
            lineHeight:0.9,
            color:'#1a1918'
          }}>
            KOM<br/>PAKT
          </div>
          <div style={{
            fontWeight:500, fontStyle:'italic',
            fontSize:'clamp(12px, 1.4vw, 16px)',
            letterSpacing:'0.45em', color:'#9a9490',
            marginTop:16
          }}>SOLUTIONS</div>
        </div>
      </div>

      {/* Bottom bar */}
      <div className="anim-fade" style={{
        animationDelay:'0.7s',
        display:'flex', justifyContent:'space-between',
        alignItems:'flex-end', paddingTop:32,
        borderTop:'1px solid rgba(26,25,24,0.12)'
      }}>
        <p style={{
          fontSize:'clamp(15px, 1.8vw, 22px)',
          fontStyle:'italic', fontWeight:400,
          letterSpacing:'0.02em', lineHeight:1.3,
          maxWidth:'50%'
        }}>
          Soluções compactas<br/>e de qualidade.
        </p>
        <div style={{display:'flex', alignItems:'center', gap:16}}>
          <Mark size={36} />
          <a href="mailto:support@kompakt.solutions" style={{
            fontSize:'clamp(11px, 1vw, 13px)',
            letterSpacing:'0.2em', color:'#9a9490',
            textDecoration:'none', fontStyle:'italic',
            transition:'color 0.2s'
          }}
          onMouseEnter={e=>e.target.style.color='#1a1918'}
          onMouseLeave={e=>e.target.style.color='#9a9490'}
          >
            support@kompakt.solutions
          </a>
        </div>
      </div>
    </div>
  );
}

// --- Layout C: Column (two-column) ---
function LayoutColumn() {
  return (
    <div style={{
      height:'100vh', display:'grid',
      gridTemplateColumns:'1fr 1fr',
    }}>
      {/* Left */}
      <div style={{
        display:'flex', flexDirection:'column',
        justifyContent:'space-between',
        padding:'clamp(32px,5vw,64px)',
        borderRight:'1px solid rgba(26,25,24,0.1)'
      }}>
        <div className="anim-fade" style={{animationDelay:'0s'}}>
          <Mark size={72} />
        </div>
        <div className="anim-fade-up" style={{animationDelay:'0.5s'}}>
          <div style={{
            fontWeight:700,
            fontSize:'clamp(40px, 5vw, 72px)',
            letterSpacing:'0.15em', lineHeight:1,
          }}>KOMPAKT</div>
          <div style={{
            fontWeight:500, fontStyle:'italic',
            fontSize:'clamp(10px, 1vw, 13px)',
            letterSpacing:'0.4em', color:'#9a9490', marginTop:8
          }}>SOLUTIONS</div>
        </div>
      </div>

      {/* Right */}
      <div style={{
        display:'flex', flexDirection:'column',
        justifyContent:'space-between',
        padding:'clamp(32px,5vw,64px)',
        background:'#1a1918'
      }}>
        <div />
        <div className="anim-fade-up" style={{animationDelay:'0.6s'}}>
          <p style={{
            fontSize:'clamp(22px, 3vw, 42px)',
            fontStyle:'italic', fontWeight:400,
            letterSpacing:'0.02em', lineHeight:1.35,
            color:'#f5f3f0'
          }}>
            Soluções compactas<br/>e de qualidade.
          </p>
        </div>
        <div className="anim-fade" style={{animationDelay:'1.1s'}}>
          <div style={{
            width:'40px', height:'1px',
            background:'rgba(245,243,240,0.2)',
            marginBottom:24
          }}/>
          <a href="mailto:support@kompakt.solutions" style={{
            fontSize:'clamp(11px, 0.9vw, 13px)',
            letterSpacing:'0.22em', color:'#9a9490',
            textDecoration:'none', fontStyle:'italic',
            transition:'color 0.2s'
          }}
          onMouseEnter={e=>e.target.style.color='#f5f3f0'}
          onMouseLeave={e=>e.target.style.color='#9a9490'}
          >
            support@kompakt.solutions
          </a>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [layout, setLayout] = React.useState(defaults.layout);
  const [key, setKey] = React.useState(0); // force remount for animation replay

  // Tweaks panel wiring
  React.useEffect(() => {
    const listener = e => {
      if (e.data?.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').classList.add('visible');
      }
      if (e.data?.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').classList.remove('visible');
      }
    };
    window.addEventListener('message', listener);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', listener);
  }, []);

  // Listen for radio changes
  React.useEffect(() => {
    const radios = document.querySelectorAll('input[name="layout"]');
    radios.forEach(r => {
      r.checked = r.value === layout;
      r.onchange = () => {
        setLayout(r.value);
        setKey(k => k + 1);
        localStorage.setItem('kompakt-tweaks', JSON.stringify({ layout: r.value }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { layout: r.value } }, '*');
      };
    });
  }, [layout]);

  return (
    <div key={key}>
      {layout === 'centered'     && <LayoutCentered />}
      {layout === 'typographic'  && <LayoutTypographic />}
      {layout === 'column'       && <LayoutColumn />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
